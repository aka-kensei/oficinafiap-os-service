apiVersion: apps/v1
kind: Deployment
metadata:
  name: os-service-deployment
  labels:
    app: os-service
    service: os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: os-service
  template:
    metadata:
      labels:
        app: os-service
        service: os
      annotations:
        admission.datadoghq.com/enabled: "true"
    spec:
      containers:
        - name: os-service
          image: ghcr.io/aka-kensei/oficinafiap-os-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "150m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          env:
            - name: ASPNETCORE_ENVIRONMENT
              valueFrom:
                configMapKeyRef: { name: os-service-config, key: ASPNETCORE_ENVIRONMENT }
            - name: Jwt__Issuer
              valueFrom:
                configMapKeyRef: { name: os-service-config, key: Jwt__Issuer }
            - name: Jwt__Audience
              valueFrom:
                configMapKeyRef: { name: os-service-config, key: Jwt__Audience }
            - name: RabbitMq__Host
              valueFrom:
                configMapKeyRef: { name: os-service-config, key: RabbitMq__Host }
            - name: RabbitMq__Username
              valueFrom:
                configMapKeyRef: { name: os-service-config, key: RabbitMq__Username }
            - name: Jwt__SecretKey
              valueFrom:
                secretKeyRef: { name: os-service-secrets, key: Jwt__SecretKey }
            - name: ConnectionStrings__OSDb
              valueFrom:
                secretKeyRef: { name: os-service-secrets, key: ConnectionStrings__OSDb }
            - name: RabbitMq__Password
              valueFrom:
                secretKeyRef: { name: os-service-secrets, key: RabbitMq__Password }

            # ── Datadog APM ─────────────────────────────────────────
            - name: DD_SERVICE
              value: "os-service"
            - name: DD_ENV
              value: "production"
            - name: DD_VERSION
              value: "4.0"
            - name: DD_AGENT_HOST
              value: "datadog-agent.datadog.svc.cluster.local"
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: CORECLR_ENABLE_PROFILING
              value: "1"
            - name: CORECLR_PROFILER
              value: "{846F5F1C-F9AE-4B07-969E-05C26BC060D8}"
            - name: CORECLR_PROFILER_PATH
              value: "/opt/datadog/Datadog.Trace.ClrProfiler.Native.so"
            - name: DD_DOTNET_TRACER_HOME
              value: "/opt/datadog"
